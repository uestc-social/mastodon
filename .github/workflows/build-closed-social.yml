name: Build Latest Container Images (ver. Closed Social)
on:
  workflow_dispatch:
  push:
    branches:
      - "cs"
    tags:
      - "cs-*"

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    uses: ./.github/workflows/build-container-image.yml
    with:
      file_to_build: Dockerfile
      platforms: linux/amd64,linux/arm64
      use_native_arm64_builder: true
      push_to_images: |
        ghcr.io/${{ github.repository_owner }}/mastodon
      flavor: |
        latest=false
      tags: |
        type=raw,value=cs-nightly,event=branch,branch=cs
        type=raw,value=cs,event=tag
        type=ref,event=tag
    secrets: inherit

  build-image-streaming:
    uses: ./.github/workflows/build-container-image.yml
    with:
      file_to_build: streaming/Dockerfile
      platforms: linux/amd64,linux/arm64
      use_native_arm64_builder: true
      push_to_images: |
        ghcr.io/${{ github.repository_owner }}/mastodon-streaming
      flavor: |
        latest=false
      tags: |
        type=raw,value=cs-nightly,event=branch,branch=cs
        type=raw,value=cs,event=tag
        type=ref,event=tag
    secrets: inherit
